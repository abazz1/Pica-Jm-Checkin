name: Daily Check-In

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      tg_message_id:
        description: 'Telegram Message ID to edit'

env:
  TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
  TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
  TG_MESSAGE_ID: ${{ github.event.inputs.tg_message_id }}

jobs:
  check:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    outputs:
      run: ${{ steps.check.outputs.run }}
    steps:
      - name: 检查定时设置
        id: check
        run: |
          ENABLED="${{ vars.SCHEDULE_ENABLED }}"
          TIME="${{ vars.SCHEDULE_TIME }}"
          if [ "$ENABLED" != "true" ]; then
            echo "❌ 定时签到已关闭"; echo "run=false" >> $GITHUB_OUTPUT; exit 0
          fi
          if [ -z "$TIME" ]; then
            echo "❌ 未设置签到时间"; echo "run=false" >> $GITHUB_OUTPUT; exit 0
          fi
          CUR=$(( $(date -u +%H)*60 + $(date -u +%M) ))
          SH=$(echo "$TIME" | cut -d: -f1); SM=$(echo "$TIME" | cut -d: -f2)
          SCH=$(( 10#$SH*60 + 10#$SM ))
          DIFF=$(( CUR - SCH )); DIFF=${DIFF#-}
          if [ "$DIFF" -le 15 ]; then
            echo "✅ 条件满足，开始签到"; echo "run=true" >> $GITHUB_OUTPUT
          else
            echo "⏰ 时间不匹配 (当前=${CUR}min 设定=${SCH}min)，跳过"
            echo "run=false" >> $GITHUB_OUTPUT
          fi

  checkin:
    needs: check
    if: always() && (github.event_name != 'schedule' || needs.check.outputs.run == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: ⏳ 计算总步数
        id: calc
        run: |
          INFRA=3; JM=0; PIC=0
          [ -n "${{ secrets.JM_USERNAME }}" ] && JM=3
          [ -n "${{ secrets.PICACG_USERNAME }}" ] && PIC=2
          TOTAL=$((INFRA + JM + PIC + 1))
          echo "TG_TOTAL=$TOTAL" >> $GITHUB_ENV
          echo "total=$TOTAL" >> $GITHUB_OUTPUT

      - name: 检出代码
        uses: actions/checkout@v4

      - name: ⏳ 检出代码
        run: |
          echo "TG_CURRENT=1" >> $GITHUB_ENV
          python3 tg_progress.py 1 "$TG_TOTAL" '检出代码 ✅'

      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: ⏳ 配置 Python
        run: |
          echo "TG_CURRENT=2" >> $GITHUB_ENV
          python3 tg_progress.py 2 "$TG_TOTAL" '配置 Python ✅'

      - name: 安装依赖
        run: |
          pip install --upgrade pip -q
          pip install -r requirements.txt -q

      - name: ⏳ 安装依赖
        run: |
          echo "TG_CURRENT=3" >> $GITHUB_ENV
          python3 tg_progress.py 3 "$TG_TOTAL" '安装依赖 ✅'

      - name: 执行签到
        env:
          JM_USERNAME: ${{ secrets.JM_USERNAME }}
          JM_PASSWORD: ${{ secrets.JM_PASSWORD }}
          PICACG_USERNAME: ${{ secrets.PICACG_USERNAME }}
          PICACG_PASSWORD: ${{ secrets.PICACG_PASSWORD }}
          PICACG_BASE_URL: ${{ secrets.PICACG_BASE_URL }}
          TG_TOTAL: ${{ steps.calc.outputs.total }}
          TG_CURRENT: 3
        run: |
          python checkin.py
