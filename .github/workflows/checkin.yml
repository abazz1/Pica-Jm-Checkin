name: Daily Check-In

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      tg_message_id:
        description: 'Telegram Message ID to edit'

env:
  TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
  TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}

jobs:
  checkin:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: ⏳ 初始化
        run: |
          MSG_ID="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tg_message_id || '' }}"
          echo "TG_MESSAGE_ID=$MSG_ID" >> $GITHUB_ENV

      - name: ⏳ 计算总步数
        id: calc
        run: |
          INFRA=3; JM=0; PIC=0
          [ -n "${{ secrets.JM_USERNAME }}" ] && JM=3
          [ -n "${{ secrets.PICACG_USERNAME }}" ] && PIC=2
          TOTAL=$((INFRA + JM + PIC + 1))
          echo "TG_TOTAL=$TOTAL" >> $GITHUB_ENV
          echo "total=$TOTAL" >> $GITHUB_OUTPUT

      - name: 检出代码
        uses: actions/checkout@v4

      - name: ⏳ 检出代码
        run: |
          echo "TG_CURRENT=1" >> $GITHUB_ENV
          python3 tg_progress.py 1 "$TG_TOTAL" '检出代码 ✅'

      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: ⏳ 配置 Python
        run: |
          echo "TG_CURRENT=2" >> $GITHUB_ENV
          python3 tg_progress.py 2 "$TG_TOTAL" '配置 Python ✅'

      - name: 随机延迟 (仅定时触发)
        if: github.event_name == 'schedule'
        run: sleep $(( RANDOM % 3600 ))

      - name: 安装依赖
        run: |
          pip install --upgrade pip -q
          pip install -r requirements.txt -q

      - name: ⏳ 安装依赖
        run: |
          echo "TG_CURRENT=3" >> $GITHUB_ENV
          python3 tg_progress.py 3 "$TG_TOTAL" '安装依赖 ✅'

      - name: 执行签到
        env:
          JM_USERNAME: ${{ secrets.JM_USERNAME }}
          JM_PASSWORD: ${{ secrets.JM_PASSWORD }}
          PICACG_USERNAME: ${{ secrets.PICACG_USERNAME }}
          PICACG_PASSWORD: ${{ secrets.PICACG_PASSWORD }}
          PICACG_BASE_URL: ${{ secrets.PICACG_BASE_URL }}
          TG_TOTAL: ${{ steps.calc.outputs.total }}
          TG_CURRENT: 3
        run: |
          python checkin.py
