name: Daily Check-In

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      tg_chat_id:
        description: 'Telegram Chat ID for progress updates'
      tg_message_id:
        description: 'Telegram Message ID to edit'

jobs:
  checkin:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 随机延迟 (仅定时触发)
        if: github.event_name == 'schedule'
        run: sleep $(( RANDOM % 3600 ))

      - name: 安装依赖
        run: |
          echo "Installing requests and pycryptodome..."
          pip install --upgrade pip -q
          pip install -r requirements.txt -q
          echo "Dependencies installed"

      - name: 执行签到
        env:
          JM_USERNAME: ${{ secrets.JM_USERNAME }}
          JM_PASSWORD: ${{ secrets.JM_PASSWORD }}
          PICACG_USERNAME: ${{ secrets.PICACG_USERNAME }}
          PICACG_PASSWORD: ${{ secrets.PICACG_PASSWORD }}
          PICACG_BASE_URL: ${{ secrets.PICACG_BASE_URL }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ inputs.tg_chat_id || secrets.TG_CHAT_ID }}
          TG_MESSAGE_ID: ${{ inputs.tg_message_id || '' }}
        run: |
          python checkin.py
